  <!-- SECURITY SCRIPT TO DISABLE DEV TOOLS & INSPECT -->
  <script>
    // 1. Disable Right Click
    document.addEventListener('contextmenu', event => event.preventDefault());

    // 2. Disable Keyboard Shortcuts (F12, Ctrl+Shift+I, Ctrl+U, etc)
    document.onkeydown = function (e) {
      // Disable F12
      if (e.keyCode == 123) {
        return false;
      }
      // Disable Ctrl+Shift+I (Inspect Element)
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) {
        return false;
      }
      // Disable Ctrl+Shift+C (Inspect Element)
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) {
        return false;
      }
      // Disable Ctrl+Shift+J (Console)
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) {
        return false;
      }
      // Disable Ctrl+U (View Source)
      if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) {
        return false;
      }
      // Disable Ctrl+S (Save Page)
      if (e.ctrlKey && e.keyCode == 'S'.charCodeAt(0)) {
        return false;
      }
      // Disable Ctrl+P (Print Page)
      if (e.ctrlKey && e.keyCode == 'P'.charCodeAt(0)) {
        return false;
      }
    };

    // 3. Disable Dragging text/images
    document.ondragstart = function() { return false; };
    
    // 4. Disable Text Selection
    document.onselectstart = function() { return false; };
  </script>

  <style>
    /* CSS backup to prevent text selection and touch highlighting */
    body {
      -webkit-user-select: none; /* Safari */
      -ms-user-select: none; /* IE 10 and IE 11 */
      user-select: none; /* Standard syntax */
      -webkit-touch-callout: none;
